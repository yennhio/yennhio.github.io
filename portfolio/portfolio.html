<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experience</title>
    <link rel="stylesheet" type="text/css" href="/portfolio/portfolio.css" />
    <link rel="icon" type="image/x-icon" href="/components/svg/favicon.svg" />
  </head>
  <body>
    <div id="navbar-container">
      <script>
        fetch("/components/navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-container").innerHTML = data;
          });
      </script>

      <script>
        fetch("/components/menu.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("menu-icon-container").innerHTML = data;
          });
      </script>

      <script>
        function myFunction(x) {
          x.classList.toggle("change");

          var mobileNav = document.querySelector(".mobile-nav");
          mobileNav.classList.toggle("show");
        }
      </script>
    </div>

    <div class="portfolio-container"></div>

    <script src="/portfolio/portfolio.js"></script>
  </body>
</html>
